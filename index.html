<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercitazione con Form</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <main>
        
        <!-- Form: nome, cognome, mail, pulsante inserisci -->
        <form class="shadow rounded p-4 m-4" id="form-invitati">
            <div class="mb-3">
                <label for="nome" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nome" name="nome">
            </div>
            
            <div class="mb-3">
                <label for="cognome" class="form-label">Password</label>
                <input type="text" class="form-control" id="cognome" name="cognome">
            </div>
            
            <div class="mb-3">
                <label class="form-label" for="email">Email</label>
                <input type="email" class="form-control" id="email" name="email">
            </div>
            
            <button type="submit" class="btn-input mb-0">Inserisci</button>
        </form>

        <div class="shadow rounded p-4 m-4">
            <div class="d-flex justify-content-between align-content-center">
                <h2>Lista invitati</h2>

                <div class="d-flex justify-content-between align-content-center">
                    <button>Ordina</button>
    
                    <div>
                        <label for="search" class="form-label">Ricerca</label>
                        <input type="text" id="search" placeholder="Cerca utente" class="form-control">
                    </div>
    
                    <div>
                        <select name="" id="">
                            <option value="tutti">Tutti</option>
                            <option value="confermati">Confermati</option>
                            <option value="nonconfermati">Non Confermati</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
