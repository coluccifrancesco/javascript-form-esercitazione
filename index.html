<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Esercitazione con Form</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Form: nome, cognome, mail, pulsante inserisci -->
    <main>
        <form action="" class="form-element">
            <div>
                <div class="input-container">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome">
                </div>
        
                <div class="input-container">
                    <label for="cognome">Cognome</label>
                    <input type="text" id="cognome" name="cognome">
                </div>
        
                <div class="input-container">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email">
                </div>
            </div>

            <button type="submit">Inserisci</button>
        </form>
        
        <div class="tools-container">
            <h2>Lista invitati</h2>
            
            <div>
                <button>Ordina</button>
                
                <div>
                    <label for="search">Ricerca</label>
                    <input type="text" id="search" placeholder="Cerca utente">
                </div>
    
                <div>
                    <select name="" id="">
                        <option value="tutti">Tutti</option>
                        <option value="confermati">Confermati</option>
                        <option value="nonconfermati">Non Confermati</option>
                    </select>
                </div>
            </div>
        </div>
    </main>

    <script src="./script.js"></script>
</body>
</html>
